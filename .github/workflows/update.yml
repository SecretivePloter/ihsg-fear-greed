name: Update IHSG Fear & Greed Data

on:
  schedule:
    # Weekdays, hourly from 10:00-17:00 WIB.
    - cron: '0 3-10 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy pytrends

      - name: Run update script
        run: python update_data.py

      - name: Commit and push updated data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historis.csv
          git diff --staged --quiet || git commit -m "auto: update Fear & Greed data $(date +'%Y-%m-%d')"
          git push